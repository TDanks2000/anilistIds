name: FetchId

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: fetch-id
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get and parse AniList sitemap IDs
        shell: bash
        run: |
          set -Eeuo pipefail

          TMP_DIR="$(mktemp -d)"
          trap 'rm -rf "$TMP_DIR"' EXIT

          MIN_KEEP_PERCENT=80

          warn_and_skip() {
            echo "::warning::$1"
            echo "FETCH_SKIPPED=true" >> "$GITHUB_ENV"
            exit 0
          }

          fetch_sitemap() {
            local sitemap_type="$1"
            local output="$2"
            local url_path="$3"
            local mode="$4"

            local tmp_output="$TMP_DIR/$output"
            local i=0

            : > "$tmp_output"

            echo "Fetching $sitemap_type sitemap..."

            while true; do
              local url="https://anilist.co/sitemap/${sitemap_type}-${i}.xml"
              local body="$TMP_DIR/${sitemap_type}-${i}.xml"
              local page_ids="$TMP_DIR/${sitemap_type}-${i}.ids"
              local http_code

              echo "Processing $url"

              http_code="$(
                curl \
                  --location \
                  --silent \
                  --show-error \
                  --compressed \
                  --connect-timeout 15 \
                  --max-time 60 \
                  --retry 3 \
                  --retry-delay 5 \
                  --retry-all-errors \
                  --user-agent "FetchId GitHub Action (${GITHUB_REPOSITORY:-unknown})" \
                  --output "$body" \
                  --write-out "%{http_code}" \
                  "$url"
              )" || http_code="000"

              case "$http_code" in
                200)
                  ;;
                404)
                  if (( i == 0 )); then
                    warn_and_skip "Got 404 on the first page for $sitemap_type. Skipping update to avoid wiping $output."
                  fi

                  echo "Reached end of $sitemap_type sitemap at page $i."
                  break
                  ;;
                000)
                  warn_and_skip "Curl/network failure while fetching $url. Skipping update."
                  ;;
                401|403)
                  warn_and_skip "Got HTTP $http_code for $url. AniList may be blocking the request. Skipping update."
                  ;;
                408|425|429)
                  warn_and_skip "Got HTTP $http_code for $url. Request was likely rate limited or timed out. Skipping update."
                  ;;
                5??)
                  warn_and_skip "Got HTTP $http_code for $url. AniList/server issue. Skipping update."
                  ;;
                *)
                  warn_and_skip "Unexpected HTTP $http_code for $url. Skipping update."
                  ;;
              esac

              if [[ ! -s "$body" ]]; then
                warn_and_skip "Empty response body for $url. Skipping update."
              fi

              : > "$page_ids"

              if [[ "$mode" == "slug" ]]; then
                grep -Eo "/${url_path}/[^/<\"?#]+" "$body" \
                  | cut -d/ -f3 \
                  >> "$page_ids" || true
              else
                grep -Eo "/${url_path}/[0-9]+" "$body" \
                  | grep -Eo "[0-9]+" \
                  >> "$page_ids" || true
              fi

              if [[ ! -s "$page_ids" ]]; then
                warn_and_skip "No IDs parsed from $url. Sitemap format may have changed. Skipping update."
              fi

              cat "$page_ids" >> "$tmp_output"

              sleep 2
              ((i++))
            done

            if [[ ! -s "$tmp_output" ]]; then
              warn_and_skip "Parsed output for $output is empty. Skipping update."
            fi

            if [[ "$mode" == "slug" ]]; then
              sort -u "$tmp_output" -o "$tmp_output"
            else
              sort -n -u "$tmp_output" -o "$tmp_output"
            fi

            local new_count
            new_count="$(wc -l < "$tmp_output" | tr -d ' ')"

            if [[ -f "$output" && -s "$output" ]]; then
              local old_count
              old_count="$(wc -l < "$output" | tr -d ' ')"

              local min_allowed=$(( old_count * MIN_KEEP_PERCENT / 100 ))

              if (( new_count < min_allowed )); then
                warn_and_skip "New $output has only $new_count lines, old file had $old_count. Suspicious shrink, skipping update."
              fi
            fi

            echo "Prepared $output with $new_count entries."
          }

          fetch_sitemap "manga" "manga_ids.txt" "manga" "numeric"
          fetch_sitemap "anime" "anime_ids.txt" "anime" "numeric"
          fetch_sitemap "staff" "staff_ids.txt" "staff" "numeric"
          fetch_sitemap "characters" "character_ids.txt" "character" "numeric"
          fetch_sitemap "articles" "articles_ids.txt" "article" "slug"

          echo "All sitemap fetches completed successfully. Replacing output files."

          cp "$TMP_DIR/manga_ids.txt" manga_ids.txt
          cp "$TMP_DIR/anime_ids.txt" anime_ids.txt
          cp "$TMP_DIR/staff_ids.txt" staff_ids.txt
          cp "$TMP_DIR/character_ids.txt" character_ids.txt
          cp "$TMP_DIR/articles_ids.txt" articles_ids.txt

      - name: Commit files
        if: env.FETCH_SKIPPED != 'true'
        shell: bash
        run: |
          set -Eeuo pipefail

          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

          git add \
            manga_ids.txt \
            anime_ids.txt \
            staff_ids.txt \
            character_ids.txt \
            articles_ids.txt

          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "Update ids"
          fi

      - name: Push changes
        if: env.FETCH_SKIPPED != 'true'
        shell: bash
        run: |
          set -Eeuo pipefail

          if git log --format=%B -n 1 | grep -q "Update ids"; then
            git push
          else
            echo "Nothing to push"
          fi
